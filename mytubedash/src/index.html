<!doctype html>
<!-- 
  Clasa "dark" este setată implicit pentru a ne asigura că aplicația pornește în Dark Mode,
  conform cerințelor pentru aspectul tip Netflix.
-->
<html lang="ro" class="dark">
  <head>
    <meta charset="utf-8" />
    <title>MyTube Dash</title>
    <!-- Script dinamic pentru HA Ingress: Calculează automat calea de bază incluzând slug-ul ascuns -->
    <script>
      (function() {
        var path = window.location.pathname;
        if (!path.endsWith('/')) path += '/';
        document.write('<base href="' + path + '" />');
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body class="antialiased">
    <app-root></app-root>
  </body>
</html>
